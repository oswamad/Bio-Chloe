<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c09664"/>
      <stop offset="100%" stop-color="#2e1408"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0e6d3" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f0e6d3" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0e6d3" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- soft circles -->
  <circle cx="280" cy="120" r="80" fill="rgba(240,230,211,0.05)"/>
  <circle cx="130" cy="280" r="60" fill="rgba(240,230,211,0.05)"/>
  <!-- petals / flower hint -->
  <g transform="translate(200,170)" opacity="0.25">
    <ellipse cx="0" cy="-28" rx="10" ry="22" fill="#f0e6d3"/>
    <ellipse cx="0" cy="-28" rx="10" ry="22" fill="#f0e6d3" transform="rotate(60)"/>
    <ellipse cx="0" cy="-28" rx="10" ry="22" fill="#f0e6d3" transform="rotate(120)"/>
    <ellipse cx="0" cy="-28" rx="10" ry="22" fill="#f0e6d3" transform="rotate(180)"/>
    <ellipse cx="0" cy="-28" rx="10" ry="22" fill="#f0e6d3" transform="rotate(240)"/>
    <ellipse cx="0" cy="-28" rx="10" ry="22" fill="#f0e6d3" transform="rotate(300)"/>
    <circle r="10" fill="#c09664"/>
  </g>
  <path d="M 20 210 Q 80 190 140 210 Q 200 230 260 210 Q 320 190 380 210"
        fill="none" stroke="url(#line)" stroke-width="1.2" opacity="0.6"/>
  <text x="200" y="274" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="28" fill="white" opacity="0.9">Clairo</text>
  <line x1="80" y1="290" x2="320" y2="290" stroke="rgba(240,230,211,0.3)" stroke-width="0.8"/>
  <text x="200" y="310" text-anchor="middle" font-family="monospace" font-size="10" letter-spacing="4" fill="rgba(240,230,211,0.5)">ARTIST</text>
</svg>
