<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9064c0"/>
      <stop offset="100%" stop-color="#1a0832"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9b8d8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9b8d8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c9b8d8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- grid dots -->
  <g opacity="0.15">
    <circle cx="100" cy="100" r="2" fill="#c9b8d8"/>
    <circle cx="200" cy="100" r="2" fill="#c9b8d8"/>
    <circle cx="300" cy="100" r="2" fill="#c9b8d8"/>
    <circle cx="100" cy="200" r="2" fill="#c9b8d8"/>
    <circle cx="300" cy="200" r="2" fill="#c9b8d8"/>
    <circle cx="100" cy="300" r="2" fill="#c9b8d8"/>
    <circle cx="200" cy="300" r="2" fill="#c9b8d8"/>
    <circle cx="300" cy="300" r="2" fill="#c9b8d8"/>
  </g>
  <!-- music note -->
  <g transform="translate(170, 120)" opacity="0.35">
    <rect x="20" y="0" width="8" height="50" fill="#c9b8d8" rx="2"/>
    <rect x="20" y="0" width="30" height="8" fill="#c9b8d8" rx="2"/>
    <ellipse cx="14" cy="52" rx="14" ry="10" fill="#c9b8d8" transform="rotate(-20, 14, 52)"/>
  </g>
  <path d="M 20 220 L 60 200 L 100 215 L 140 195 L 180 210 L 220 190 L 260 208 L 300 195 L 340 210 L 380 200"
        fill="none" stroke="url(#line)" stroke-width="1.2" opacity="0.5"/>
  <text x="200" y="290" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="28" fill="white" opacity="0.9">Kikuo</text>
  <line x1="80" y1="306" x2="320" y2="306" stroke="rgba(201,184,216,0.3)" stroke-width="0.8"/>
  <text x="200" y="326" text-anchor="middle" font-family="monospace" font-size="10" letter-spacing="4" fill="rgba(201,184,216,0.5)">ARTIST</text>
</svg>
