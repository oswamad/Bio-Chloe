  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- moon -->
  <circle cx="220" cy="160" r="50" fill="rgba(245,169,184,0.1)" stroke="rgba(245,169,184,0.2)" stroke-width="1"/>
  <circle cx="240" cy="150" r="40" fill="url(#bg)"/>
