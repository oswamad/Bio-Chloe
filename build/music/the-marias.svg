  <line x1="80" y1="294" x2="320" y2="294" stroke="rgba(245,169,184,0.3)" stroke-width="0.8"/>
  <text x="200" y="314" text-anchor="middle" font-family="monospace" font-size="10" letter-spacing="4" fill="rgba(245,169,184,0.5)">ARTIST</text>
