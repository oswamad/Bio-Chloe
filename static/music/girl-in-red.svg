<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0647a"/>
      <stop offset="100%" stop-color="#3a0e1e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5a9b8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f5a9b8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f5a9b8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- waveform decoration -->
  <path d="M 20 200 Q 50 160 80 200 Q 110 240 140 200 Q 170 160 200 200 Q 230 240 260 200 Q 290 160 320 200 Q 350 240 380 200"
        fill="none" stroke="url(#line)" stroke-width="1.5" opacity="0.5"/>
  <path d="M 20 210 Q 60 180 100 210 Q 140 240 180 210 Q 220 180 260 210 Q 300 240 340 210 Q 370 195 380 210"
        fill="none" stroke="rgba(245,169,184,0.25)" stroke-width="1"/>
  <!-- heart -->
  <path d="M 200 155 C 200 145 190 135 180 135 C 165 135 155 148 155 162 C 155 180 200 205 200 205 C 200 205 245 180 245 162 C 245 148 235 135 220 135 C 210 135 200 145 200 155Z"
        fill="rgba(245,169,184,0.15)" stroke="rgba(245,169,184,0.4)" stroke-width="1"/>
  <!-- name -->
  <text x="200" y="260" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="28" fill="white" opacity="0.9">girl in red</text>
  <line x1="80" y1="278" x2="320" y2="278" stroke="rgba(245,169,184,0.3)" stroke-width="0.8"/>
  <text x="200" y="298" text-anchor="middle" font-family="monospace" font-size="10" letter-spacing="4" fill="rgba(245,169,184,0.5)">ARTIST</text>
</svg>
