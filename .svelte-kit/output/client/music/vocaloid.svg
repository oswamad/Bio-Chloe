<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64c0b4"/>
      <stop offset="100%" stop-color="#081e1c"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64c0b4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a0ffe0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#64c0b4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- digital pattern -->
  <rect x="155" y="110" width="90" height="90" fill="none" stroke="rgba(100,192,180,0.15)" stroke-width="1"/>
  <rect x="168" y="123" width="64" height="64" fill="none" stroke="rgba(100,192,180,0.2)" stroke-width="1"/>
  <circle cx="200" cy="155" r="20" fill="rgba(100,192,180,0.1)" stroke="rgba(100,192,180,0.3)" stroke-width="1"/>
  <!-- equal sign (vocaloid energy) -->
  <rect x="182" y="150" width="36" height="5" rx="2" fill="rgba(100,192,180,0.4)"/>
  <rect x="182" y="160" width="36" height="5" rx="2" fill="rgba(100,192,180,0.4)"/>
  <path d="M 20 220 L 50 205 L 80 220 L 110 205 L 140 220 L 170 205 L 200 220 L 230 205 L 260 220 L 290 205 L 320 220 L 350 205 L 380 220"
        fill="none" stroke="url(#line)" stroke-width="1.5" opacity="0.7"/>
  <text x="200" y="282" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="28" fill="white" opacity="0.9">Vocaloid</text>
  <line x1="80" y1="298" x2="320" y2="298" stroke="rgba(100,192,180,0.3)" stroke-width="0.8"/>
  <text x="200" y="318" text-anchor="middle" font-family="monospace" font-size="10" letter-spacing="4" fill="rgba(100,192,180,0.5)">ARTIST</text>
